name: school_management
description: "Flutter mobile app for AI-powered School Management System."

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.1

  # UI
  flutter_svg: ^2.0.7
  intl: ^0.19.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0

  # Authentication
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^9.0.0

  # PDF & File Handling
  pdf: ^3.10.5
  file_picker: ^6.1.0
  open_file: ^3.5.8

  # Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.6.7
  flutter_local_notifications: ^16.2.0

  # Date & Time
  table_calendar: ^3.0.9

  # Charts
  fl_chart: ^0.63.0

  # URL Launcher
  url_launcher: ^6.1.14

  # Device Info
  device_info_plus: ^9.1.1
  package_info_plus: ^4.1.1

  # Connectivity
  connectivity_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

  # Generate environment config
  # Use: flutter run --dart-define=API_URL=http://localhost:8000
